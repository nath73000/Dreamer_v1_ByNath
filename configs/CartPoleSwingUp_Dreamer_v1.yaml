environment_name: CartePole



dreamer:

  encoded_obs_size: 1024

  encorder:
    depth: 16
    stride: 2
    padding: 1
    kernel_size: 3
    activation: ReLU

  recurrent_model:
    hidden_size: 64
    activation: elu

  actor:
    hidden_size: 64
    nb_layers:   3
    activation: ReLU

  critic:
    hidden_size: 64
    nb_layers:   3
    activation: ReLU